<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obrigado · Dra. Raquel Almeida</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'&gt;&lt;rect width='64' height='64' rx='14' fill='%23F7CBA1'/&gt;&lt;text x='50%25' y='54%25' font-family='Georgia,serif' font-size='36' font-weight='700' fill='%23090B0B' text-anchor='middle' dominant-baseline='middle'&gt;R&lt;/text&gt;&lt;/svg&gt;" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../style.css" />

  <style>
    .thankyou {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(48px, 8vw, 96px) var(--gutter);
      background:
        radial-gradient(65% 55% at 90% 20%, rgba(237,188,142,.35) 0%, transparent 65%),
        radial-gradient(55% 60% at 5% 85%, rgba(234,229,216,.60) 0%, transparent 65%),
        var(--c-bg);
      text-align: center;
    }
    .thankyou__card {
      max-width: 520px;
      width: 100%;
      display: grid;
      gap: 24px;
      justify-items: center;
    }
    .thankyou__icon {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--c-primary), var(--c-primary-2));
      display: grid;
      place-items: center;
      box-shadow: 0 12px 40px -10px rgba(237,188,142,.55);
    }
    .thankyou__icon svg { color: #2E1608; }
    .thankyou__eyebrow {
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #7D4A1A;
    }
    .thankyou__title {
      font-family: var(--ff-serif);
      font-size: clamp(30px, 6vw, 48px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.018em;
      margin: 0;
    }
    .thankyou__title em {
      font-style: italic;
      font-weight: 700;
      color: #9B5A22;
    }
    .thankyou__sub {
      font-size: clamp(15px, 1.8vw, 17px);
      color: var(--c-muted);
      line-height: 1.65;
      max-width: 42ch;
      margin: 0;
    }
    .thankyou__wa {
      --bg: #25D366;
      --fg: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 32px;
      border-radius: 999px;
      font-family: var(--ff-sans);
      font-weight: 600;
      font-size: 15px;
      background: var(--bg);
      color: var(--fg);
      border: none;
      box-shadow: 0 8px 30px -8px rgba(37,211,102,.50);
      text-decoration: none;
      transition: transform .2s ease, box-shadow .25s ease;
      width: 100%;
      max-width: 360px;
    }
    .thankyou__wa:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px -10px rgba(37,211,102,.55);
    }
    .thankyou__wa:active { transform: translateY(0); }
    .thankyou__back {
      font-size: 13.5px;
      color: var(--c-muted);
    }
    .thankyou__back a {
      color: #9B5A22;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>

  <main class="thankyou" role="main">
    <div class="thankyou__card">

      <div class="thankyou__icon" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6 9 17l-5-5"/>
        </svg>
      </div>

      <p class="thankyou__eyebrow">Mensagem recebida</p>

      <h1 class="thankyou__title">
        Obrigado pelo<br/>
        <em>seu contato!</em>
      </h1>

      <p class="thankyou__sub">
        Recebemos seus dados e nossa equipe entrará em contato em breve. Se preferir, fale com a gente agora mesmo pelo WhatsApp.
      </p>

      <a
        class="thankyou__wa"
        href="https://wa.me/5519991431192"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Falar com a equipe da Dra. Raquel pelo WhatsApp"
      >
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Falar pelo WhatsApp
      </a>

      <p class="thankyou__back">
        <a href="../">← Voltar ao site</a>
      </p>

    </div>
  </main>

</body>
</html>
